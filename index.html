<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English to Anglish Translator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #f5f5f5;
        }

        .subtitle {
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 700px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .panel-label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #aaa;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #4a6fa5;
        }

        textarea#output {
            background: #0f3460;
            cursor: default;
        }

        .btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a4a;
            color: #ccc;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #3a3a5a;
            color: #fff;
        }

        .btn.copied {
            background: #2e7d32;
            border-color: #4caf50;
            color: #fff;
        }

        .stats {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>English &rarr; Anglish</h1>
    <p class="subtitle">Swap Latin, French &amp; Greek loanwords for their Germanic roots</p>

    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <span class="panel-label">English</span>
                <button class="btn" id="clearBtn">Clear</button>
            </div>
            <textarea id="input" placeholder="Paste your English text here..." spellcheck="false"></textarea>
            <div class="stats" id="inputStats"></div>
        </div>
        <div class="panel">
            <div class="panel-header">
                <span class="panel-label">Anglish</span>
                <button class="btn" id="copyBtn">Copy</button>
            </div>
            <textarea id="output" readonly placeholder="Anglish output will appear here..."></textarea>
            <div class="stats" id="outputStats"></div>
        </div>
    </div>

    <script src="dictionary.js"></script>
    <script src="translator.js"></script>
</body>
</html>
